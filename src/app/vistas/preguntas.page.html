<ion-content [fullscreen]="true" class="vigi-container">

  <!-- Logo UTC -->
  <div class="top-logo-container">
    <img src="assets/imgs/UTC_logo-plano.webp" alt="Logo UTC" class="main-logo">
  </div>

  <!-- CONTENIDO -->
  <div class="preguntas-content">

    <h2 class="titulo">Preguntas Frecuentes</h2>

    <ion-searchbar
      [(ngModel)]="textoBusqueda"
      placeholder="Buscar pregunta..."
      animated="true"
      class="custom-search">
    </ion-searchbar>

    <ion-list>
      <ion-item *ngFor="let item of preguntasFiltradas">
        {{ item.pregunta }}
      </ion-item>
    </ion-list>

    <div *ngIf="preguntasFiltradas.length === 0" class="no-results">
      No se encontraron resultados
    </div>

  </div>

  <!-- NAVBAR -->
  <div class="navbar-wrapper">
    <div class="custom-navbar">

      <div class="nav-button" routerLink="/home">
        <ion-icon name="home"></ion-icon>
        <span class="nav-text">Inicio</span>
      </div>

      <div class="nav-button active">
        <ion-icon name="help-circle"></ion-icon>
        <span class="nav-text">Preguntas</span>
      </div>

      <div class="nav-button">
        <ion-icon name="map"></ion-icon>
        <span class="nav-text">Mapa</span>
      </div>

      <div class="nav-button">
        <ion-icon name="calendar"></ion-icon>
        <span class="nav-text">Calendario</span>
      </div>

      <div class="nav-button">
        <ion-icon name="document-text"></ion-icon>
        <span class="nav-text">Blog</span>
      </div>

      <div class="nav-button">
        <ion-icon name="ellipsis-horizontal"></ion-icon>
        <span class="nav-text">Otros</span>
      </div>

    </div>
  </div>

</ion-content>
