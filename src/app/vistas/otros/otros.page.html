<ion-content [fullscreen]="true" class="vigi-container">
  <app-logo-utc></app-logo-utc>

  <div class="otros-wrapper">
    <div class="header-section">
      <h1 class="main-title">Sobre Nosotros</h1>
    </div>

    <div class="image-showcase">
      <div class="card main-card">
        <img src="assets/imgs/campus.jpeg" alt="Campus UTC">
      </div>
      <div class="side-grid">
        <div class="card"><img src="assets/imgs/lab.webp" alt="Lab"></div>
        <div class="card"><img src="assets/imgs/Alumnos.jpeg" alt="Estudiantes"></div>
      </div>
    </div>

    <div class="institutional-info">
      <div class="info-block">
        <h3>Nuestra Misión</h3>
        <p>En la Universidad Tecnológica de Coahuila (UTC), formamos profesionales líderes que impulsan el desarrollo tecnológico y productivo de México.</p>
      </div>
    </div>

    <div class="final-footer">
      <div class="social-bar">
        <a href="#" class="social-btn"><ion-icon name="logo-facebook"></ion-icon></a>
        <a href="#" class="social-btn"><ion-icon name="logo-instagram"></ion-icon></a>
        <a href="#" class="social-btn"><ion-icon name="logo-tiktok"></ion-icon></a>
        <a href="#" class="social-btn"><ion-icon name="logo-twitter"></ion-icon></a>
      </div>
      
      <div class="copyright-box">
        <p>© 2021 - 2026 Todos los Derechos reservados:</p>
        <p class="utc-bold">Universidad Tecnológica de Coahuila</p>
      </div>
    </div>
  </div>

  <app-custom-navbar></app-custom-navbar>
</ion-content>
